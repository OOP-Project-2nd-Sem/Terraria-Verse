name: Build TerrariaVerse EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # lets you trigger it manually from GitHub UI

jobs:
  build-exe:
    runs-on: windows-latest  # must be Windows to produce a .exe

    steps:

      # ── 1. Checkout your code ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up JDK 21 (includes jpackage) ─────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      # ── 3. Build fat JAR with Maven Shade ────────────────────────────────
      - name: Build fat JAR
        run: mvn clean package -DskipTests

      # ── 4. Find the fat JAR name (excludes the -original.jar) ────────────
      - name: Find JAR name
        id: jarname
        shell: pwsh
        run: |
          $jar = Get-ChildItem target/*.jar |
                 Where-Object { $_.Name -notlike "*original*" } |
                 Sort-Object Length -Descending |
                 Select-Object -First 1
          echo "JAR=$($jar.Name)" >> $env:GITHUB_OUTPUT
          echo "Found JAR: $($jar.Name)"

      # ── 5. Install WiX 3 (required by jpackage to make .exe) ─────────────
      - name: Install WiX Toolset
        shell: pwsh
        run: |
          $url = "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314.exe"
          Invoke-WebRequest $url -OutFile wix-installer.exe
          Start-Process -FilePath wix-installer.exe -ArgumentList "/quiet" -Wait
          # Add WiX to PATH for subsequent steps
          echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" >> $env:GITHUB_PATH

      # ── 6. Package as .exe with jpackage ─────────────────────────────────
      - name: Run jpackage
        shell: pwsh
        run: |
          jpackage `
            --input target/ `
            --main-jar "${{ steps.jarname.outputs.JAR }}" `
            --main-class com.almasb.game.GameApp `
            --name "TerrariaVerse" `
            --app-version 1.0.0 `
            --type exe `
            --win-shortcut `
            --win-menu `
            --dest output/ `
            --java-options "--add-opens java.base/java.lang=ALL-UNNAMED" `
            --java-options "--add-opens javafx.graphics/com.sun.javafx.application=ALL-UNNAMED"

      # ── 7. Upload the .exe as a build artifact ────────────────────────────
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: TerrariaVerse-Windows-Installer
          path: output/*.exe
          retention-days: 30
